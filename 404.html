<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Halaman Tidak Ditemukan | Lucky Ubaidillah</title>
  <link rel="icon" type="image/png" href="logo-lu.jpeg" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script>
    (function(){
      var t=localStorage.getItem('lu-theme');
      if(!t) t=window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark';
      document.documentElement.setAttribute('data-theme',t);
    })();
  </script>
  <style>
    :root {
      --bg: #0a0a0f;
      --bg2: #0f0f18;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --accent: #5b8dee;
      --accent2: #7aa3f5;
      --accent-glow: rgba(91,141,238,0.25);
      --text: #f0f0f5;
      --text2: #a0a0b0;
      --text3: #606070;
    }
    html[data-theme="light"] {
      --bg:      #f2f2fa;
      --bg2:     #e8e8f5;
      --surface: rgba(0,0,0,0.04);
      --border:  rgba(0,0,0,0.09);
      --border2: rgba(0,0,0,0.15);
      --accent:  #4a7de8;
      --text:    #14142a;
      --text2:   #44446a;
      --text3:   #8888aa;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background effects */
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: .15;
      pointer-events: none;
      animation: pulse 8s ease-in-out infinite alternate;
    }
    .bg-blob-1 { width:500px; height:500px; background:radial-gradient(circle,#5b8dee,transparent 70%); top:-150px; right:-100px; }
    .bg-blob-2 { width:350px; height:350px; background:radial-gradient(circle,#a78bfa,transparent 70%); bottom:-100px; left:-80px; animation-delay:-4s; }
    @keyframes pulse { 0%{transform:scale(1)} 100%{transform:scale(1.2) translate(20px,-20px)} }

    .grid {
      position: fixed; inset:0;
      background-image: linear-gradient(rgba(91,141,238,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(91,141,238,.03) 1px,transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* Main content */
    .container {
      text-align: center;
      position: relative; z-index: 1;
      padding: 40px 24px;
      max-width: 520px;
    }

    .error-num {
      font-family: 'Syne', sans-serif;
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 800;
      letter-spacing: -.06em;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      animation: floatNum 3s ease-in-out infinite;
    }
    @keyframes floatNum {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-12px); }
    }

    .error-icon {
      font-size: 32px;
      margin-bottom: 16px;
      animation: spin 6s linear infinite;
      display: inline-block;
      color: var(--accent);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 700;
      letter-spacing: -.03em;
      color: var(--text);
      margin-bottom: 12px;
    }

    p {
      font-size: 15px;
      color: var(--text2);
      line-height: 1.7;
      margin-bottom: 36px;
    }

    .btn-group { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 48px; }

    .btn-primary {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 13px 28px;
      background: var(--accent); color: #fff;
      border-radius: 50px; font-weight: 600; font-size: 14px;
      text-decoration: none;
      transition: all .3s ease;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px var(--accent-glow); }

    .btn-ghost {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 13px 28px;
      border: 1.5px solid var(--border2); color: var(--text2);
      border-radius: 50px; font-weight: 500; font-size: 14px;
      text-decoration: none;
      transition: all .3s ease;
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }

    /* Quick links */
    .quick-links {
      display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
    }
    .quick-link {
      padding: 6px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      font-size: 12px;
      color: var(--text3);
      text-decoration: none;
      transition: all .25s;
    }
    .quick-link:hover { color: var(--accent); border-color: var(--accent); background: rgba(91,141,238,.07); }

    /* Brand */
    .brand {
      position: fixed; top: 24px; left: 40px;
      font-family: 'Syne', sans-serif;
      font-size: 1.2rem; font-weight: 800;
      color: var(--text); text-decoration: none;
      letter-spacing: -.03em;
    }
    .brand span { color: var(--accent); }
  </style>
</head>
<body>
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>
  <div class="grid"></div>

  <a href="index.html" class="brand">Lucky<span>.U</span></a>

  <div class="container">
    <div class="error-num">404</div>
    <i class="fas fa-compass-drafting error-icon"></i>
    <h1>Halaman Tidak Ditemukan</h1>
    <p>Sepertinya halaman yang kamu cari tidak ada atau sudah dipindahkan. Mungkin ada typo di URL? Tidak masalah, kita bisa kembali ke jalur yang benar!</p>

    <div class="btn-group">
      <a href="index.html" class="btn-primary"><i class="fas fa-house"></i> Kembali ke Home</a>
      <a href="javascript:history.back()" class="btn-ghost"><i class="fas fa-arrow-left"></i> Halaman Sebelumnya</a>
    </div>

    <div class="quick-links">
      <a href="index.html#about"    class="quick-link">About</a>
      <a href="index.html#skills"   class="quick-link">Skills</a>
      <a href="index.html#projects" class="quick-link">Projects</a>
      <a href="index.html#blog"     class="quick-link">Blog</a>
      <a href="index.html#contact"  class="quick-link">Contact</a>
    </div>
  </div>
</body>
</html>
